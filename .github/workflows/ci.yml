name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: go test -race ./...
      - run: go vet ./...
      - name: Check Go formatting
        run: |
          UNFORMATTED="$(gofmt -l .)"
          test -z "$UNFORMATTED" || { printf '%s\n' "$UNFORMATTED"; exit 1; }
      - run: bash -n installer.sh
      - run: shellcheck installer.sh
      - name: Build static Linux AMD64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -o dist/chr-install-linux-amd64 ./cmd/chr-install
      - uses: actions/upload-artifact@v4
        with:
          name: chr-install-linux-amd64
          path: dist/chr-install-linux-amd64
          if-no-files-found: error
